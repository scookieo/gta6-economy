<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vice Network</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">Vice Network</div>

        <div class="nav-links">
            <a href="#">Crews</a>
            <a href="#">Creators</a>
            <a href="#">Events</a>
            <a href="#">Search</a>
        </div>

        <button class="cta">Create Crew</button>
    </nav>

    <!-- HERO -->
    <section class="hero">

        <h1>Find Your GTA Community</h1>

        <p>
            Discover crews, creators, and events before GTA 6 launches.
        </p>

        <div class="hero-buttons">
            <button class="primary">Explore Crews</button>
            <button class="secondary">Browse Creators</button>
        </div>

    </section>

    <!-- FEATURED SECTION -->
    <section class="featured">

        <h2>🔥 Trending Crews</h2>

        <div class="card-grid">

            <div class="card">
                <h3>Vice Syndicate</h3>
                <p>Business • Racing • Heists</p>
            </div>

            <div class="card">
                <h3>Ocean Drift</h3>
                <p>Casual • Cars • Chill RP</p>
            </div>

            <div class="card">
                <h3>Night Riders</h3>
                <p>Competitive • PvP • Events</p>
            </div>

        </div>

    </section>

</body>

</html>
